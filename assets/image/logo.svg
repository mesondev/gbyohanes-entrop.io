<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Blue Circle Background -->
  <circle cx="100" cy="100" r="90" fill="#003594" stroke="#001F5C" stroke-width="2"/>
  
  <!-- Red Flame -->
  <path d="M 115,50 C 115,50 95,75 110,100 C 125,120 150,110 145,90 C 140,70 130,60 130,60 C 130,60 140,75 135,85 C 130,95 120,90 120,80 C 120,70 128,55 115,50 Z" fill="#E53E3E" stroke="#7B1D1D" stroke-width="1.5"/>
  
  <!-- Open Bible Pages -->
  <!-- Left Page -->
  <path d="M 100,140 C 75,130 50,135 35,145 L 35,120 C 50,110 75,105 100,115 Z" fill="#ffffff" stroke="#001F5C" stroke-width="2"/>
  <!-- Right Page -->
  <path d="M 100,140 C 125,130 150,135 165,145 L 165,120 C 150,110 125,105 100,115 Z" fill="#ffffff" stroke="#001F5C" stroke-width="2"/>
  <!-- Bible Middle line -->
  <line x1="100" y1="115" x2="100" y2="140" stroke="#001F5C" stroke-width="2" />

  <!-- White Banner at the bottom -->
  <path d="M 70,150 L 130,150 L 125,175 L 75,175 Z" fill="#ffffff" stroke="#001F5C" stroke-width="2" />
  <text x="100" y="169" font-family="'Inter', sans-serif" font-weight="900" font-size="14" fill="#003594" text-anchor="middle" letter-spacing="1">PGBP</text>

  <!-- White Cross on the left, which cuts the circle -->
  <g fill="#ffffff" stroke="#001F5C" stroke-width="2">
    <!-- Vertical member -->
    <rect x="55" y="25" width="16" height="135" rx="1" />
    <!-- Horizontal member -->
    <rect x="20" y="70" width="86" height="16" rx="1" />
  </g>
  <!-- To merge them nicely without overlapping stroke lines -->
  <rect x="56" y="71" width="14" height="14" fill="#ffffff" />
</svg>
